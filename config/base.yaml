experiment:
  name: pointworld_cnn_mlp_lambda01
  seed: 42
  device: auto

paths:
  data_root: data
  runs_root: runs
  artifacts_root: artifacts

env:
  image_size: 64
  channels: 3
  dot_radius: 2
  step_scale: 2.5
  action_dim: 2
  use_wall: false

#data:
#  name: pointworld_small
#  path: data/raw/pointworld_small.pt
#  num_trajectories: 500
#  trajectory_length: 32
#  train_split: 0.8
#  val_split: 0.1
#  test_split: 0.1

data:
  name: pointworld_medium
  path: data/raw/pointworld_medium.pt
  num_trajectories: 2000
  trajectory_length: 48
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

model:
  type: cnn_mlp
  latent_dim: 32
  encoder:
    hidden_dims: [32, 64, 128, 128]
  predictor:
    hidden_dim: 128
    num_layers: 2

loss:
  lambda_sigreg: 0.1
  sigreg:
    num_projections: 64
    eps: 1.0e-6

train:
  batch_size: 32
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 0
  log_every: 20
  validate_every: 1
  save_every: 1
