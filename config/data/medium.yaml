experiment:
  name: pointworld_medium_dataset
  seed: 42

paths:
  data_root: data

env:
  image_size: 64
  channels: 3
  dot_radius: 2
  step_scale: 2.5
  action_dim: 2
  use_wall: false

data:
  name: pointworld_medium
  path: data/raw/pointworld_medium.pt
  num_trajectories: 2000
  trajectory_length: 48
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
