experiment:
  name: pointworld_small_dataset
  seed: 42

paths:
  data_root: data

env:
  image_size: 64
  channels: 3
  dot_radius: 2
  step_scale: 2.5
  action_dim: 2
  use_wall: false

data:
  name: pointworld_small
  path: data/raw/pointworld_small.pt
  num_trajectories: 500
  trajectory_length: 32
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
